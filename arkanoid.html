<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арканоид</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a14;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 50% 0%, rgba(78, 205, 196, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(255, 107, 107, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }
        #gameCanvas { 
            background: linear-gradient(180deg, #0d0d1a 0%, #151525 100%); 
            border-radius: 16px; 
            box-shadow: 
                0 0 60px rgba(78, 205, 196, 0.15),
                inset 0 0 100px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        a {
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }
        a:hover { 
            transform: scale(1.05); 
            box-shadow: 0 6px 25px rgba(255, 107, 107, 0.5);
        }
        #score { 
            color: #fff; 
            font-size: 1.6rem; 
            margin-bottom: 0.5rem; 
            font-weight: 300;
            letter-spacing: 0.1em;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }
        #instructions { color: #666; font-size: 0.9rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <p id="score">Счёт: 0</p>
    <p id="instructions">Зажми стрелку влево/вправо для движения</p>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <a href="index.html">На главную</a>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        let score = 0;

        const paddle = { w: 130, h: 20, x: 235, y: 365, speed: 10 };
        const ball = { x: 300, y: 350, r: 9, dx: 3.5, dy: -3.5 };

        const keys = { left: false, right: false };

        const brickColors = ['#ff6b6b', '#ffd93d', '#4ecdc4', '#95e879', '#c4a7e7', '#ff9f43'];
        const bricks = [];
        const cols = 8, rows = 5;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                bricks.push({ x: c * 72 + 10, y: r * 30 + 30, w: 65, h: 22, hit: false, color: brickColors[(r + c) % brickColors.length] });
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
            e.preventDefault();
        });

        document.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
        });

        function drawGlowRect(x, y, w, h, color, radius = 4) {
            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = color;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, radius);
            ctx.fill();
            ctx.restore();
        }

        function gameLoop() {
            if (keys.left) paddle.x -= paddle.speed;
            if (keys.right) paddle.x += paddle.speed;
            paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
            for (let i = 0; i < 20; i++) {
                ctx.fillRect(i * 30, 0, 1, canvas.height);
            }

            bricks.forEach(b => {
                if (!b.hit) {
                    drawGlowRect(b.x, b.y, b.w, b.h, b.color, 4);
                }
            });

            const paddleGradient = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
            paddleGradient.addColorStop(0, '#6ee7de');
            paddleGradient.addColorStop(1, '#3db8b0');
            drawGlowRect(paddle.x, paddle.y, paddle.w, paddle.h, paddleGradient, 10);

            ctx.save();
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#ffffff';
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fill();

            const ballGlow = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.r * 1.5);
            ballGlow.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
            ballGlow.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = ballGlow;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r * 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.x - ball.r <= 0 || ball.x + ball.r >= canvas.width) ball.dx *= -1;
            if (ball.y - ball.r <= 0) ball.dy *= -1;

            if (ball.y + ball.r >= paddle.y && ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
                ball.dy = -Math.abs(ball.dy);
                ball.dx += (ball.x - (paddle.x + paddle.w / 2)) * 0.05;
            }

            bricks.forEach(b => {
                if (!b.hit) {
                    if (ball.x >= b.x && ball.x <= b.x + b.w && ball.y >= b.y && ball.y <= b.y + b.h) {
                        b.hit = true;
                        ball.dy *= -1;
                        score += 10;
                        scoreEl.textContent = 'Счёт: ' + score;
                    }
                }
            });

            if (ball.y > canvas.height) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff6b6b';
                ctx.font = 'bold 42px "Segoe UI", Arial';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#ff6b6b';
                ctx.fillText('Игра окончена', canvas.width / 2, canvas.height / 2 - 10);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#aaa';
                ctx.font = '22px "Segoe UI", Arial';
                ctx.fillText('Счёт: ' + score, canvas.width / 2, canvas.height / 2 + 40);
                return;
            }

            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
