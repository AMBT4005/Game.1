<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameCanvas { background: #000; border-radius: 10px; }
        a {
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background: #95e879;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.2rem;
        }
        #score { color: #fff; font-size: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <a href="index.html">На главную</a>
    <p id="score">Счёт: 0</p>
    <canvas id="gameCanvas" width="450" height="450"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        let score = 0;

        const size = 15;
        const snake = [{ x: 7, y: 7 }];
        let food = { x: 10, y: 10 };
        let dx = 1, dy = 0;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#95e879';
            snake.forEach(s => {
                ctx.fillRect(s.x * size, s.y * size, size - 1, size - 1);
            });

            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(food.x * size, food.y * size, size - 1, size - 1);
        }

        function move() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = 'Счёт: ' + score;
                food = { x: Math.floor(Math.random() * 30), y: Math.floor(Math.random() * 30) };
            } else {
                snake.pop();
            }

            if (head.x < 0 || head.x >= 30 || head.y < 0 || head.y >= 30) {
                ctx.fillStyle = '#fff';
                ctx.font = '30px Arial';
                ctx.fillText('Игра окончена', 150, 225);
                return false;
            }

            return true;
        }

        function gameLoop() {
            draw();
            if (!move()) return;
            setTimeout(gameLoop, 150);
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
        });

        gameLoop();
    </script>
</body>
</html>
