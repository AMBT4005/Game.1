<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a14;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 50% 0%, rgba(149, 232, 121, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(149, 232, 121, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }
        #gameCanvas { 
            background: linear-gradient(180deg, #0a0f0a 0%, #0f150f 100%); 
            border-radius: 16px; 
            box-shadow: 
                0 0 60px rgba(149, 232, 121, 0.15),
                inset 0 0 100px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        a {
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #95e879, #7cc45e);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(149, 232, 121, 0.3);
        }
        a:hover { 
            transform: scale(1.05); 
            box-shadow: 0 6px 25px rgba(149, 232, 121, 0.5);
        }
        #score { 
            color: #fff; 
            font-size: 1.6rem; 
            margin-bottom: 0.5rem; 
            font-weight: 300;
            letter-spacing: 0.1em;
            text-shadow: 0 0 20px rgba(149, 232, 121, 0.5);
        }
        #instructions { color: #666; font-size: 0.9rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <p id="score">Счёт: 0</p>
    <p id="instructions">Стрелки для управления</p>
    <canvas id="gameCanvas" width="480" height="480"></canvas>
    <a href="index.html">На главную</a>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        let score = 0;

        const size = 16;
        const gridSize = 30;
        const snake = [{ x: 15, y: 15 }];
        let food = { x: 20, y: 20 };
        let dx = 1, dy = 0;
        let particles = [];
        let gameOver = false;

        function createParticles(x, y) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x * size + size / 2,
                    y: y * size + size / 2,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    life: 1,
                    color: Math.random() > 0.5 ? '#95e879' : '#7cc45e'
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.025;
                return p.life > 0;
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
            ctx.globalAlpha = 1;
        }

        function drawGrid() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.015)';
            for (let i = 0; i <= gridSize; i++) {
                ctx.fillRect(i * size, 0, 1, canvas.height);
                ctx.fillRect(0, i * size, canvas.width, 1);
            }
        }

        function drawSnake() {
            snake.forEach((s, i) => {
                const isHead = i === 0;
                const alpha = 1 - (i / snake.length) * 0.3;

                ctx.save();
                
                const gradient = ctx.createRadialGradient(
                    s.x * size + size / 2, s.y * size + size / 2, 0,
                    s.x * size + size / 2, s.y * size + size / 2, size / 2
                );

                if (isHead) {
                    gradient.addColorStop(0, 'rgba(180, 255, 140, 1)');
                    gradient.addColorStop(1, 'rgba(100, 200, 80, 1)');
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#95e879';
                } else {
                    gradient.addColorStop(0, `rgba(149, 232, 121, ${alpha})`);
                    gradient.addColorStop(1, `rgba(100, 180, 70, ${alpha})`);
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = 'rgba(149, 232, 121, 0.5)';
                }

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(s.x * size + 1, s.y * size + 1, size - 2, size - 2, isHead ? 6 : 4);
                ctx.fill();

                if (isHead) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 2.5;
                    const eyeOff = 5;

                    if (dx === 1) {
                        ctx.beginPath(); ctx.arc(s.x * size + size - eyeOff, s.y * size + eyeOff, eyeSize, 0, Math.PI * 2); ctx.fill();
                        ctx.beginPath(); ctx.arc(s.x * size + size - eyeOff, s.y * size + size - eyeOff, eyeSize, 0, Math.PI * 2); ctx.fill();
                    } else if (dx === -1) {
                        ctx.beginPath(); ctx.arc(s.x * size + eyeOff, s.y * size + eyeOff, eyeSize, 0, Math.PI * 2); ctx.fill();
                        ctx.beginPath(); ctx.arc(s.x * size + eyeOff, s.y * size + size - eyeOff, eyeSize, 0, Math.PI * 2); ctx.fill();
                    } else if (dy === -1) {
                        ctx.beginPath(); ctx.arc(s.x * size + eyeOff, s.y * size + eyeOff, eyeSize, 0, Math.PI * 2); ctx.fill();
                        ctx.beginPath(); ctx.arc(s.x * size + size - eyeOff, s.y * size + eyeOff, eyeSize, 0, Math.PI * 2); ctx.fill();
                    } else {
                        ctx.beginPath(); ctx.arc(s.x * size + eyeOff, s.y * size + size - eyeOff, eyeSize, 0, Math.PI * 2); ctx.fill();
                        ctx.beginPath(); ctx.arc(s.x * size + size - eyeOff, s.y * size + size - eyeOff, eyeSize, 0, Math.PI * 2); ctx.fill();
                    }
                }

                ctx.restore();
            });
        }

        function drawFood() {
            ctx.save();
            
            const gradient = ctx.createRadialGradient(
                food.x * size + size / 2 - 2, food.y * size + size / 2 - 2, 0,
                food.x * size + size / 2, food.y * size + size / 2, size / 2
            );
            gradient.addColorStop(0, '#ff9999');
            gradient.addColorStop(1, '#ff5555');

            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff6b6b';
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(food.x * size + 2, food.y * size + 2, size - 4, size - 4, 5);
            ctx.fill();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.roundRect(food.x * size + 4, food.y * size + 4, size / 3, size / 4, 2);
            ctx.fill();
            
            ctx.restore();
        }

        function draw() {
            ctx.fillStyle = '#050805';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();
            updateParticles();
            drawParticles();
            drawFood();
            drawSnake();
        }

        function move() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = 'Счёт: ' + score;
                createParticles(food.x, food.y);
                food = { x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize) };
            } else {
                snake.pop();
            }

            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver = true;
                    break;
                }
            }

            if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
                gameOver = true;
            }
        }

        function gameLoop() {
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff6b6b';
                ctx.font = 'bold 42px "Segoe UI", Arial';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#ff6b6b';
                ctx.fillText('Игра окончена!', canvas.width / 2, canvas.height / 2 - 10);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#aaa';
                ctx.font = '22px "Segoe UI", Arial';
                ctx.fillText('Счёт: ' + score, canvas.width / 2, canvas.height / 2 + 40);
                return;
            }

            draw();
            move();
            setTimeout(gameLoop, 140);
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
            e.preventDefault();
        });

        gameLoop();
    </script>
</body>
</html>
