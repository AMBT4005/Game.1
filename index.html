<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0d0d1a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(78, 205, 196, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 107, 107, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(149, 232, 121, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        h1 {
            color: #fff;
            font-size: 3.5rem;
            font-weight: 300;
            margin-bottom: 3rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .buttons {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 1.8rem 3.5rem;
            font-size: 1.3rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: white;
            font-weight: 500;
            letter-spacing: 0.05em;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn:hover {
            transform: translateY(-8px);
        }
        .btn-arkanoid {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            box-shadow: 0 4px 25px rgba(255, 107, 107, 0.3);
        }
        .btn-arkanoid:hover {
            box-shadow: 0 12px 40px rgba(255, 107, 107, 0.5);
        }
        .btn-tetris {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a8a0 100%);
            box-shadow: 0 4px 25px rgba(78, 205, 196, 0.3);
        }
        .btn-tetris:hover {
            box-shadow: 0 12px 40px rgba(78, 205, 196, 0.5);
        }
        .btn-snake {
            background: linear-gradient(135deg, #95e879 0%, #7cc45e 100%);
            box-shadow: 0 4px 25px rgba(149, 232, 121, 0.3);
        }
        .btn-snake:hover {
            box-shadow: 0 12px 40px rgba(149, 232, 121, 0.5);
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="container">
        <h1>Игры</h1>
        <div class="buttons">
            <a href="arkanoid.html" class="btn btn-arkanoid">Арканоид</a>
            <a href="tetris.html" class="btn btn-tetris">Тетрис</a>
            <a href="snake.html" class="btn btn-snake">Змейка</a>
        </div>
    </div>
    <script>
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (15 + Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
