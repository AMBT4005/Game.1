<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арканоид</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameCanvas { background: #000; border-radius: 10px; box-shadow: 0 0 30px rgba(78, 205, 196, 0.3); }
        a {
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background: #ff6b6b;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }
        a:hover { transform: scale(1.05); }
        #score { color: #fff; font-size: 1.5rem; margin-bottom: 0.5rem; text-shadow: 0 0 10px rgba(78, 205, 196, 0.5); }
        #instructions { color: #888; font-size: 0.9rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <a href="index.html">На главную</a>
    <p id="score">Счёт: 0</p>
    <p id="instructions">Зажми стрелку влево/вправо для движения</p>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        let score = 0;

        const paddle = { w: 120, h: 18, x: 240, y: 370, speed: 18 };
        const ball = { x: 300, y: 350, r: 10, dx: 4, dy: -4 };

        const keys = { left: false, right: false };

        const brickColors = ['#ff6b6b', '#ffd93d', '#4ecdc4', '#95e879', '#c4a7e7'];
        const bricks = [];
        const cols = 8, rows = 5;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                bricks.push({ x: c * 72 + 10, y: r * 30 + 30, w: 65, h: 20, hit: false, color: brickColors[r % brickColors.length] });
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
            e.preventDefault();
        });

        document.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
        });

        function gameLoop() {
            if (keys.left) paddle.x -= paddle.speed;
            if (keys.right) paddle.x += paddle.speed;
            paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            bricks.forEach(b => {
                if (!b.hit) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = b.color;
                    ctx.fillStyle = b.color;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.shadowBlur = 0;
                }
            });

            ctx.shadowBlur = 15;
            ctx.shadowColor = '#4ecdc4';
            ctx.fillStyle = '#4ecdc4';
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 8);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.shadowBlur = 15;
            ctx.shadowColor = '#fff';
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.x - ball.r <= 0 || ball.x + ball.r >= canvas.width) ball.dx *= -1;
            if (ball.y - ball.r <= 0) ball.dy *= -1;

            if (ball.y + ball.r >= paddle.y && ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
                ball.dy = -Math.abs(ball.dy);
            }

            bricks.forEach(b => {
                if (!b.hit) {
                    if (ball.x >= b.x && ball.x <= b.x + b.w && ball.y >= b.y && ball.y <= b.y + b.h) {
                        b.hit = true;
                        ball.dy *= -1;
                        score += 10;
                        scoreEl.textContent = 'Счёт: ' + score;
                    }
                }
            });

            if (ball.y > canvas.height) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Игра окончена', canvas.width / 2, canvas.height / 2);
                ctx.font = '20px Arial';
                ctx.fillText('Счёт: ' + score, canvas.width / 2, canvas.height / 2 + 40);
                return;
            }

            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
