<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арканоид</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameCanvas { background: #000; border-radius: 10px; }
        a {
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background: #ff6b6b;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.2rem;
        }
        #score { color: #fff; font-size: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <a href="index.html">На главную</a>
    <p id="score">Счёт: 0</p>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        let score = 0;

        const paddle = { w: 100, h: 15, x: 250, y: 370, speed: 8 };
        const ball = { x: 300, y: 350, r: 10, dx: 4, dy: -4 };

        const bricks = [];
        const cols = 8, rows = 5;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                bricks.push({ x: c * 72 + 10, y: r * 30 + 30, w: 65, h: 20, hit: false });
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') paddle.x -= paddle.speed;
            if (e.key === 'ArrowRight') paddle.x += paddle.speed;
        });

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            bricks.forEach(b => {
                if (!b.hit) {
                    ctx.fillStyle = '#ff6b6b';
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                }
            });

            ctx.fillStyle = '#4ecdc4';
            ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fill();

            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.x - ball.r <= 0 || ball.x + ball.r >= canvas.width) ball.dx *= -1;
            if (ball.y - ball.r <= 0) ball.dy *= -1;

            if (ball.y + ball.r >= paddle.y && ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
                ball.dy = -Math.abs(ball.dy);
            }

            bricks.forEach(b => {
                if (!b.hit) {
                    if (ball.x >= b.x && ball.x <= b.x + b.w && ball.y >= b.y && ball.y <= b.y + b.h) {
                        b.hit = true;
                        ball.dy *= -1;
                        score += 10;
                        scoreEl.textContent = 'Счёт: ' + score;
                    }
                }
            });

            if (ball.y > canvas.height) {
                ctx.fillStyle = '#fff';
                ctx.font = '30px Arial';
                ctx.fillText('Игра окончена', 200, 200);
                return;
            }

            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
